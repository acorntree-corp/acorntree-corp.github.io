<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에이콘트리 주식회사 | Acorn Tree</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { --primary-color: #2D5A27; --accent-color: #8B5A2B; --text-dark: #1d1d1f; --text-light: #86868b; --bg-light: #f5f5f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { color: var(--text-dark); background-color: #fff; scroll-behavior: smooth; }
        
        header { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        nav { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; }
        .logo { font-size: 1.2rem; font-weight: 800; color: var(--primary-color); text-decoration: none; }
        .nav-links a { margin-left: 30px; text-decoration: none; color: var(--text-dark); font-size: 0.95rem; font-weight: 500; }

        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at bottom, #f0f4f0 0%, #fff 70%); padding: 0 20px; }
        .hero h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 24px; letter-spacing: -1.5px; }
        .hero .accent { color: var(--primary-color); }

        section { max-width: 900px; margin: 0 auto; padding: 100px 24px; }
        h2 { font-size: 2rem; font-weight: 700; margin-bottom: 40px; text-align: center; }

        /* 공고판 리스트 */
        .notice-list { border-top: 2px solid var(--primary-color); }
        .notice-item { padding: 25px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .notice-item:hover { background: #f9f9f9; padding-left: 25px; }
        .notice-title { font-weight: 500; }
        .notice-date { color: #aaa; font-size: 0.9rem; }

        /* 팝업창(모달) 스타일 */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { background: #fff; margin: 10% auto; padding: 40px; border-radius: 20px; width: 90%; max-width: 600px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); line-height: 1.8; }
        .close { position: absolute; right: 25px; top: 20px; font-size: 28px; font-weight: bold; color: #ccc; cursor: pointer; }
        .modal-body h3 { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-body p { white-space: pre-wrap; color: #444; }

        footer { padding: 60px; background: var(--bg-light); text-align: center; color: #999; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="#" class="logo">ACORN TREE</a>
        <div class="nav-links">
            <a href="#about">ABOUT</a>
            <a href="#notices">NOTICE</a>
        </div>
    </nav>
</header>

<section class="hero">
    <h1>Great oaks from<br><span class="accent">little acorns grow.</span></h1>
</section>

<section id="notices">
    <h2>PUBLIC NOTICE</h2>
    <div class="notice-list">
        <div class="notice-item" onclick="openModal('notice1')">
            <span class="notice-title">주식회사 에이콘트리 설립 공고</span>
            <span class="notice-date">2026. 01. 11</span>
        </div>
        <div class="notice-item" onclick="openModal('notice2')">
            <span class="notice-title">공고방법에 관한 안내</span>
            <span class="notice-date">2026. 01. 11</span>
        </div>
    </div>
</section>

<div id="noticeModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalBody" class="modal-body">
            </div>
    </div>
</div>

<footer>
    &copy; 2026 Acorn Tree Co., Ltd. All rights reserved.
</footer>

<script>
    const notices = {
        notice1: {
            title: "주식회사 에이콘트리 설립 공고",
            content: "주식회사 에이콘트리는 2026년 1월 11일 발기인 총회를 거쳐 정식 설립되었음을 공고합니다.\n\n1. 상호: 에이콘트리 주식회사\n2. 본점: 서울특별시 [상세주소]\n3. 공고방법: 당사 인터넷 홈페이지(acorntree-corp.github.io)\n4. 대표이사: [성함]"
        },
        notice2: {
            title: "공고방법에 관한 안내",
            content: "당사는 정관 제4조에 의거하여 회사의 공고를 인터넷 홈페이지에 게재합니다.\n다만, 전산장애 기타 부득이한 사유로 회사의 인터넷 홈페이지에 공고를 할 수 없는 때에는 서울특별시에서 발행하는 일간 [신문이름]에 게재합니다."
        }
    };

    function openModal(id) {
        const modal = document.getElementById("noticeModal");
        const body = document.getElementById("modalBody");
        body.innerHTML = `<h3>${notices[id].title}</h3><p>${notices[id].content}</p>`;
        modal.style.display = "block";
    }

    function closeModal() {
        document.getElementById("noticeModal").style.display = "none";
    }

    // 창 바깥 클릭시 닫기
    window.onclick = function(event) {
        if (event.target == document.getElementById("noticeModal")) closeModal();
    }
</script>

</body>
</html>
